name: Source policy
on: [push, pull_request]
permissions:
  contents: read
jobs:
  source-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: python3 .github/scripts/codex-source-policy-check --repo "$GITHUB_WORKSPACE" --all-tracked
